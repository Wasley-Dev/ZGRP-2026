<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Zaya Group Portal</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico?v=0.1.5">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png?v=0.1.5">
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png?v=0.1.5">
    <link rel="shortcut icon" href="./favicon.ico?v=0.1.5">
    <link rel="manifest" href="./site.webmanifest">
    <meta name="theme-color" content="#003366">
    <link rel="stylesheet" href="./vendor/fonts/inter/inter.css">
    <link rel="stylesheet" href="./vendor/fontawesome/css/all.min.css">
    <script src="./vendor/tailwindcss.cdn.js"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              gold: '#D4AF37',
              enterprise: {
                blue: '#003366',
                lightBlue: '#004080',
                darkBlue: '#001a33',
              }
            },
            backgroundImage: {
              'enterprise-pattern': "repeating-linear-gradient(135deg, rgba(255,255,255,0.06) 0 2px, rgba(0,0,0,0.06) 2px 4px)",
            }
          }
        }
      }
    </script>
    <style>
        html, body, #root {
            width: 100%;
            min-height: 100%;
            margin: 0;
        }
        body {
            min-height: 100dvh;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            transition: background-color 200ms ease, color 200ms ease;
        }
        html:not(.dark) body {
            background-color: #f8fbff;
            color: #0f172a;
        }
        html.dark body {
            background-color: #081024;
            color: #dbeafe;
        }
        html:not(.dark) .theme-light {
            color: #0f172a;
        }
        html.dark .theme-dark {
            color: #dbeafe;
        }
        /* Force complete mode switch for common hardcoded panel tokens */
        html:not(.dark) .bg-\[\#0f1a2e\] {
            background-color: #ffffff !important;
            color: #0f172a !important;
        }
        html:not(.dark) .bg-\[\#0a1628\] {
            background-color: #f6f9ff !important;
            color: #0f172a !important;
        }
        /* Fix light-mode readability for nested headings using text-white inside forced-light panels */
        html:not(.dark) .bg-\[\#0f1a2e\] .text-white,
        html:not(.dark) .bg-\[\#0a1628\] .text-white {
            color: #003366 !important;
        }
        html:not(.dark) .border-\[\#1e3a5f\] {
            border-color: #d9e5ff !important;
        }
        html:not(.dark) .text-blue-400,
        html:not(.dark) .text-blue-300,
        html:not(.dark) .text-blue-200,
        html:not(.dark) .text-blue-100 {
            color: #003366 !important;
        }
        /* Light mode readability enforcement for faint utility text colors */
        html:not(.dark) .text-slate-300,
        html:not(.dark) .text-slate-400,
        html:not(.dark) .text-slate-500 {
            color: #475569 !important;
        }
        html:not(.dark) .text-slate-600,
        html:not(.dark) .text-slate-700 {
            color: #334155 !important;
        }
        html:not(.dark) .text-blue-300\/30,
        html:not(.dark) .text-blue-300\/40,
        html:not(.dark) .text-blue-300\/50,
        html:not(.dark) .text-blue-300\/60,
        html:not(.dark) .text-blue-300\/70,
        html:not(.dark) .text-blue-400\/30,
        html:not(.dark) .text-blue-400\/40,
        html:not(.dark) .text-blue-400\/50,
        html:not(.dark) .text-blue-400\/60,
        html:not(.dark) .text-blue-400\/70 {
            color: #003366 !important;
            opacity: 0.9 !important;
        }
        html:not(.dark) .text-slate-300\/30,
        html:not(.dark) .text-slate-300\/40,
        html:not(.dark) .text-slate-300\/50,
        html:not(.dark) .text-slate-300\/60,
        html:not(.dark) .text-slate-300\/70,
        html:not(.dark) .text-slate-400\/30,
        html:not(.dark) .text-slate-400\/40,
        html:not(.dark) .text-slate-400\/50,
        html:not(.dark) .text-slate-400\/60,
        html:not(.dark) .text-slate-400\/70,
        html:not(.dark) .text-slate-500\/30,
        html:not(.dark) .text-slate-500\/40,
        html:not(.dark) .text-slate-500\/50,
        html:not(.dark) .text-slate-500\/60,
        html:not(.dark) .text-slate-500\/70 {
            color: #475569 !important;
            opacity: 0.95 !important;
        }
        html.dark .text-blue-50,
        html.dark .text-blue-100,
        html.dark .text-blue-200,
        html.dark .text-blue-300,
        html.dark .text-blue-400,
        html.dark .text-blue-500 {
            color: #ffffff !important;
        }
        #root {
          min-height: calc(var(--app-vh, 1vh) * 100);
        }
        .app-shell {
          width: 100vw;
          max-width: none;
          min-height: calc(var(--app-vh, 1vh) * 100);
          margin-inline: 0;
          overflow: hidden;
        }

        /* ── Utility classes replacing inline styles in App.tsx / Layout.tsx ── */
        .app-full-height {
          min-height: calc(var(--app-vh, 1vh) * 100);
        }
        .zaya-logo-font {
          font-family: 'Times New Roman', Times, serif;
        }

        .enterprise-blue { background-color: #003366; }
        .text-gold { color: #D4AF37; }
        .bg-gold { background-color: #D4AF37; }
        .border-gold { border-color: #D4AF37; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }

        @keyframes loading {
          0% { width: 0%; transform: translateX(-100%); }
          50% { width: 40%; transform: translateX(100%); }
          100% { width: 0%; transform: translateX(250%); }
        }

        @keyframes login-particle-float {
          0% {
            transform: translate3d(0, 0, 0) scale(0.9);
            opacity: 0;
          }
          15% {
            opacity: 1;
          }
          50% {
            transform: translate3d(16px, -28px, 0) scale(1.08);
            opacity: 0.85;
          }
          100% {
            transform: translate3d(-10px, -58px, 0) scale(0.92);
            opacity: 0;
          }
        }

        .login-texture {
          background-color: #003366;
          background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
          background-size: 24px 24px;
        }
        .ui-panel {
          background: rgba(255, 255, 255, 0.9);
          border: 1px solid rgba(148, 163, 184, 0.35);
          border-radius: 1.5rem;
          box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
          /* -webkit- prefix MUST come before standard property for Safari 9+ / iOS 9+ */
          -webkit-backdrop-filter: blur(8px);
          backdrop-filter: blur(8px);
        }
        .dark .ui-panel {
          background: linear-gradient(180deg, #131d49 0%, #0b1431 100%);
          border-color: rgba(96, 165, 250, 0.2);
          box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }
        .ui-subpanel {
          background: rgba(248, 250, 252, 0.9);
          border: 1px solid rgba(148, 163, 184, 0.25);
          border-radius: 1rem;
        }
        .dark .ui-subpanel {
          background: rgba(15, 23, 42, 0.55);
          border-color: rgba(96, 165, 250, 0.2);
        }
        .ui-title {
          color: #0f172a;
          font-weight: 900;
          text-transform: uppercase;
          letter-spacing: -0.01em;
        }
        .dark .ui-title { color: #fff; }
        .ui-subtitle {
          color: #64748b;
          font-size: 10px;
          font-weight: 800;
          text-transform: uppercase;
          letter-spacing: 0.18em;
        }
        .dark .ui-subtitle { color: #94a3b8; }
        .ui-input {
          width: 100%;
          border-radius: 1rem;
          border: 1px solid rgba(148, 163, 184, 0.35);
          background: rgba(248, 250, 252, 0.95);
          color: #0f172a;
          outline: none;
        }
        .dark .ui-input {
          border-color: rgba(96, 165, 250, 0.25);
          background: rgba(2, 6, 23, 0.9);
          color: #fff;
        }
        .ui-btn-primary {
          border-radius: 0.9rem;
          background: #003366;
          color: #fff;
          font-weight: 900;
          text-transform: uppercase;
          letter-spacing: 0.14em;
        }
        .ui-btn-gold {
          border-radius: 0.9rem;
          background: #D4AF37;
          color: #003366;
          font-weight: 900;
          text-transform: uppercase;
          letter-spacing: 0.14em;
        }

        /* Liquid glass surfaces (offline-safe: no external assets) */
        .liquid-surface,
        .liquid-panel,
        .liquid-bar {
          position: relative;
          -webkit-backdrop-filter: blur(16px) saturate(140%);
          backdrop-filter: blur(16px) saturate(140%);
        }

        .liquid-surface::before,
        .liquid-panel::before,
        .liquid-bar::before {
          content: '';
          position: absolute;
          inset: 0;
          border-radius: inherit;
          pointer-events: none;
          opacity: 0.7;
          background:
            radial-gradient(120% 120% at 18% 12%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 58%),
            radial-gradient(120% 120% at 86% 0%, rgba(59,130,246,0.22) 0%, rgba(59,130,246,0) 52%),
            linear-gradient(180deg, rgba(255,255,255,0.35), rgba(255,255,255,0));
          mix-blend-mode: overlay;
        }

        .liquid-surface > *,
        .liquid-panel > *,
        .liquid-bar > * {
          position: relative;
          z-index: 1;
        }

        .liquid-panel {
          border-radius: 1.5rem;
          background: rgba(255, 255, 255, 0.76);
          border: 1px solid rgba(15, 23, 42, 0.10);
          box-shadow:
            0 24px 80px rgba(2, 6, 23, 0.14),
            inset 0 1px 0 rgba(255, 255, 255, 0.55);
        }

        .liquid-surface {
          background: rgba(255, 255, 255, 0.70);
          border: 1px solid rgba(15, 23, 42, 0.08);
          box-shadow: 0 18px 60px rgba(2, 6, 23, 0.10);
        }

        .liquid-bar {
          background: rgba(255, 255, 255, 0.66);
        }

        html.dark .liquid-panel {
          background: rgba(10, 18, 40, 0.62);
          border-color: rgba(96, 165, 250, 0.18);
          box-shadow:
            0 26px 90px rgba(0, 0, 0, 0.48),
            inset 0 1px 0 rgba(255, 255, 255, 0.10);
        }

        html.dark .liquid-surface {
          background: rgba(12, 20, 44, 0.56);
          border-color: rgba(96, 165, 250, 0.16);
          box-shadow: 0 20px 70px rgba(0, 0, 0, 0.40);
        }

        html.dark .liquid-bar {
          background: rgba(15, 27, 64, 0.50);
        }

        html.dark .liquid-surface::before,
        html.dark .liquid-panel::before,
        html.dark .liquid-bar::before {
          opacity: 0.85;
          background:
            radial-gradient(120% 120% at 18% 12%, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0) 62%),
            radial-gradient(120% 120% at 86% 0%, rgba(59,130,246,0.24) 0%, rgba(59,130,246,0) 52%),
            linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0));
          mix-blend-mode: screen;
        }

        .liquid-tint-blue {
          background-image:
            radial-gradient(circle at 18% 10%, rgba(16,85,165,0.22) 0%, rgba(16,85,165,0) 55%),
            radial-gradient(circle at 85% 0%, rgba(212,175,55,0.14) 0%, rgba(212,175,55,0) 52%);
          background-blend-mode: overlay;
        }

        @supports not ((-webkit-backdrop-filter: blur(1px)) or (backdrop-filter: blur(1px))) {
          .liquid-surface, .liquid-panel, .liquid-bar {
            -webkit-backdrop-filter: none;
            backdrop-filter: none;
          }
        }
    </style>
<script>
  (function () {
    const applyViewportMetrics = () => {
      const vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--app-vh', `${vh}px`);
      document.documentElement.setAttribute(
        'data-orientation',
        window.innerWidth >= window.innerHeight ? 'landscape' : 'portrait'
      );
    };
    applyViewportMetrics();
    window.addEventListener('resize', applyViewportMetrics);
    window.addEventListener('orientationchange', applyViewportMetrics);
  })();
</script>
</head>
<body>
    <div id="root">
      <div id="boot-splash" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at top,#1055a5 0%,#003366 34%,#02111f 100%);color:#fff;">
        <div style="width:100%;max-width:480px;text-align:center;">
          <div style="margin:0 auto 28px;display:flex;height:152px;width:152px;align-items:center;justify-content:center;border-radius:28px;background:rgba(255,255,255,0.96);padding:14px;box-shadow:0 24px 80px rgba(0,0,0,0.35);">
            <img src="./REVISED%20LOGO.png" alt="System logo" style="height:100%;width:100%;object-fit:contain;" />
          </div>
          <p style="margin:0 0 12px;font-size:10px;font-weight:900;letter-spacing:0.35em;text-transform:uppercase;color:#D4AF37;">Zaya Group Portal</p>
          <p style="margin:0;font-size:12px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.72);">Loading workspace</p>
        </div>
      </div>
    </div>
<script>
  (function () {
    const splash = document.getElementById('boot-splash');
    if (!splash) return;

    const startedAt = Date.now();
    const watchdogMs = 20000;
    const tickMs = 500;

    const interval = window.setInterval(() => {
      try {
        if (window.__APP_BOOTED__) {
          window.clearInterval(interval);
          if (splash.parentElement) splash.parentElement.removeChild(splash);
          return;
        }
        if (Date.now() - startedAt < watchdogMs) return;

        window.clearInterval(interval);
        splash.innerHTML =
          '<div style="width:100%;max-width:520px;text-align:center;">' +
          '  <div style="margin:0 auto 22px;display:flex;height:112px;width:112px;align-items:center;justify-content:center;border-radius:24px;background:rgba(255,255,255,0.96);padding:12px;box-shadow:0 24px 80px rgba(0,0,0,0.35);">' +
          '    <img src="./REVISED%20LOGO.png" alt="System logo" style="height:100%;width:100%;object-fit:contain;" />' +
          '  </div>' +
          '  <p style="margin:0 0 10px;font-size:10px;font-weight:900;letter-spacing:0.34em;text-transform:uppercase;color:#D4AF37;">Zaya Group Portal</p>' +
          '  <h1 style="margin:0 0 10px;font-size:18px;font-weight:900;letter-spacing:-0.01em;">Startup is taking longer than expected</h1>' +
          '  <p style="margin:0 auto 16px;font-size:12px;line-height:1.7;max-width:460px;color:rgba(255,255,255,0.76);">If this persists, refresh the page. For offline/Electron use, make sure you open the installed app or the built <code style=\"font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;\">dist/index.html</code> and not the source file.</p>' +
          '  <button id="boot-reload" style="cursor:pointer;border:0;border-radius:14px;padding:12px 18px;background:#D4AF37;color:#003366;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;box-shadow:0 16px 40px rgba(0,0,0,0.35);">Reload</button>' +
          '</div>';

        const btn = document.getElementById('boot-reload');
        if (btn) btn.addEventListener('click', () => window.location.reload());
      } catch {
        // If watchdog fails, keep the splash visible.
      }
    }, tickMs);
  })();
</script>
<script type="module" src="./index.tsx"></script>
</body>
</html>
